# =============================================================================
# General Settings
# =============================================================================

# Large scrollback buffer
set-option -g history-limit 999999

# Reduce escape delay (critical for vim users)
set-option -sg escape-time 10

# Increase display-time for messages
set-option -g display-time 2000

# Enable focus events (for vim autoread and similar)
set-option -g focus-events on

# Start window and pane numbering at 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set-option -g renumber-windows on

# Automatic window rename based on current directory
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Refresh status bar every 5 seconds
set-option -g status-interval 5

# Activity monitoring
set-option -g monitor-activity on
set-option -g visual-activity off

# =============================================================================
# Terminal / True Color
# =============================================================================

set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,gnome*:Tc"

# =============================================================================
# Mouse Support
# =============================================================================

set-option -g mouse on

# Scroll in vim: detect vim and send Ctrl+Y/Ctrl+E instead of entering copy mode
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n WheelUpPane if-shell "$is_vim" "send-keys C-y C-y C-y" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane if-shell "$is_vim" "send-keys C-e C-e C-e" "send-keys -M"

# Disable tmux right-click menu (buggy mouse tracking in 3.2a)
# Use Shift+Right-click for GNOME Terminal's native menu instead
unbind -n MouseDown3Pane
unbind -n MouseUp3Pane

# Middle-click paste from X primary selection
bind -n MouseDown2Pane run -b "xclip -o -selection primary 2>/dev/null | tmux load-buffer - 2>/dev/null; tmux paste-buffer -dp 2>/dev/null"
bind -T copy-mode-vi MouseDown2Pane send-keys -X cancel \; run -b "xclip -o -selection primary 2>/dev/null | tmux load-buffer - 2>/dev/null; tmux paste-buffer -dp 2>/dev/null"

# =============================================================================
# Vi Mode and Clipboard
# =============================================================================

set-option -g mode-keys vi

# v to begin selection, y to yank to clipboard, Ctrl-v for rectangle select
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi Home send-keys -X start-of-line
bind -T copy-mode-vi End send-keys -X end-of-line

# Mouse selection copies to X primary (for middle-click paste), keeps highlight
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "xclip -in -selection primary -f | xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear "xclip -in -selection primary -f | xclip -in -selection clipboard"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear "xclip -in -selection primary -f | xclip -in -selection clipboard"

# Double/triple click in normal mode: enter copy mode, select, and copy to X selections
bind -n DoubleClick1Pane select-pane \; copy-mode \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear "xclip -in -selection primary -f | xclip -in -selection clipboard"
bind -n TripleClick1Pane select-pane \; copy-mode \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear "xclip -in -selection primary -f | xclip -in -selection clipboard"

# Prefix+P to paste from tmux buffer
bind P paste-buffer

# =============================================================================
# Pane Navigation (vim-style, additive to default arrow keys)
# =============================================================================

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+hjkl for pane switching without prefix (fastest)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# =============================================================================
# Pane Splitting (intuitive keys, additive to default % and ")
# =============================================================================

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Override defaults to also inherit current path
unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# =============================================================================
# Pane Resizing
# =============================================================================

# Prefix + capital HJKL (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Prefix + Shift+Arrow to swap panes in that direction
bind S-Left swap-pane -s '{left-of}'
bind S-Right swap-pane -s '{right-of}'
bind S-Up swap-pane -s '{up-of}'
bind S-Down swap-pane -s '{down-of}'

# =============================================================================
# Window Management
# =============================================================================

# Alt+number to jump to window (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Swap windows left/right
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# =============================================================================
# Session Management
# =============================================================================

bind s choose-tree -sZ
bind S switch-client -l

# =============================================================================
# Utility
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Toggle synchronize-panes (type in all panes at once)
bind e setw synchronize-panes

# Kill pane without confirmation
bind x kill-pane

# Clear screen and scrollback
bind C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# =============================================================================
# Status Bar - Catppuccin Mocha Theme
# =============================================================================

set-option -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left: user@host | session name
set-option -g status-left-length 50
set-option -g status-left '#[fg=#cba6f7]#(~/.tmux/scripts/user_host.sh #{pane_pid}) #[fg=#585b70]| #[fg=#a6e3a1,bold]#S #[fg=#585b70]| '

# Right: git branch | time | date
set-option -g status-right-length 80
set-option -g status-right '#[fg=#89b4fa]#(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "no-repo") #[fg=#585b70]| #[fg=#f9e2af]%H:%M #[fg=#585b70]| #[fg=#cdd6f4]%d-%b-%y'

# Window tabs
set-option -g window-status-format '#[fg=#585b70,bg=#1e1e2e] #I:#W '
set-option -g window-status-current-format '#[fg=#1e1e2e,bg=#a6e3a1,bold] * #I:#W * #[default]'
set-option -g window-status-separator '#[fg=#45475a]│'
set-option -g window-status-activity-style 'fg=#f9e2af'
set-option -g window-status-bell-style 'fg=#f38ba8'

# Pane borders
set-option -g pane-border-style 'fg=#45475a'
set-option -g pane-active-border-style 'fg=#a6e3a1'

# Message styling
set-option -g message-style 'bg=#1e1e2e fg=#a6e3a1'

# =============================================================================
# Pane Dimming
# =============================================================================

set-option -g window-style 'fg=colour238'
set-option -g window-active-style 'fg=#ffffff'

# =============================================================================
# Plugins (TPM - keep at bottom of config)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-yank settings
set -g @yank_selection_mouse 'clipboard'
set -g @yank_selection 'clipboard'
set -g @yank_action 'copy-pipe'
set -g @yank_with_mouse 'off'

# Initialize TPM (MUST be the very last line)
run '~/.tmux/plugins/tpm/tpm'
